  # Pattern A — audit only, never blocks the pipeline:
  #   run: python main.py --url ${{ vars.STAGING_URL }} --format json --fail-on none
  #
  # Pattern B — block pipeline only on CRITICAL findings:
  #   run: python main.py --url ${{ vars.STAGING_URL }} --format json --fail-on critical
  #
  # Pattern C — block on HIGH or CRITICAL (default), upload JSON as artifact:
