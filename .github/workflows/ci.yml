name: CI

# Exit code contract:
#   0 = scan completed, no findings at or above --fail-on threshold
#   1 = scan completed, findings AT OR ABOVE threshold were detected (security alert)
#   1 = configuration / argument error (check stderr for details)
#
# In CI, exit code 1 from the scanner means "security alert state", NOT "build broken".
# Use --fail-on none   to always exit 0  (audit-only, never blocks the pipeline).
# Use --fail-on critical to only block on CRITICAL findings.
# Use --fail-on high   to block on HIGH or CRITICAL findings (default).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 bandit
      - name: Flake8
        run: flake8 . --max-line-length=120 --exclude=__pycache__,.git,*.egg-info
      - name: Bandit Security Scan
        run: bandit -r modules/ core/ utils/ reporter/ -ll --skip B101

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - run: pip install -r requirements-dev.txt
      - name: Run Tests
        run: pytest tests/ -v --cov=modules --cov-report=xml --cov-report=term-missing
      - name: Upload Coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

